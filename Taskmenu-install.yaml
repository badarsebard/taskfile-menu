# yaml-language-server: $schema=https://taskfile.dev/schema.json

version: "3"

includes:
  base: ./Taskfile.yaml
  menu: ./Taskmenu.yaml

tasks:
  default:
    cmds:
      - cp .task/remote/http.raw.githubusercontent.com.main.Taskfile.yaml.*.yaml Taskfile.yaml
      - cp .task/remote/http.raw.githubusercontent.com.main.Taskmenu.yaml.*.yaml Taskmenu.yaml
      - rm -rf .task/

  menu-only:
    cmds:
      - cp .task/remote/http.raw.githubusercontent.com.main.Taskmenu.yaml.*.yaml Taskmenu.yaml
      - rm -rf .task/